<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        :root {
            --primary: #3b82f6;
            --primary-glow: rgba(59, 130, 246, 0.5);
            --danger: #ef4444;
            --success: #10b981;
            --warning: #f59e0b;
            --bg: #020617;
            --card: #0f172a;
            --card-hover: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: #1e293b;
            --glass: rgba(15, 23, 42, 0.8);
        }

        body {
            width: 350px;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            padding: 1.5rem;
            background: radial-gradient(circle at top right, rgba(59, 130, 246, 0.1), transparent);
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo-box {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--primary), #1d4ed8);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px var(--primary-glow);
        }

        h1 {
            font-size: 1.125rem;
            font-weight: 700;
            margin: 0;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-badge {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            padding: 4px 10px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background: var(--success);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--success);
        }

        .status-label {
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--success);
            text-transform: uppercase;
            letter-spacing: 0.025em;
        }

        .main-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.25rem;
            margin-bottom: 1.5rem;
            position: relative;
            overflow: hidden;
        }

        .main-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(to right, transparent, var(--border), transparent);
        }

        .shield-icon-large {
            position: absolute;
            right: -10px;
            bottom: -10px;
            opacity: 0.05;
            transform: rotate(-15deg);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .stat-item {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid var(--border);
            padding: 1rem;
            border-radius: 12px;
            transition: all 0.2s;
        }

        .stat-item:hover {
            border-color: var(--primary);
            background: rgba(30, 41, 59, 0.8);
        }

        .stat-val {
            display: block;
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 2px;
        }

        .stat-lbl {
            font-size: 0.65rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .config-section {
            margin-top: 1.5rem;
        }

        .input-wrapper {
            position: relative;
            margin-bottom: 1rem;
        }

        input {
            width: 100%;
            background: #020617;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 0.75rem 1rem;
            color: var(--text);
            font-size: 0.875rem;
            box-sizing: border-box;
            transition: all 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .btn-group {
            display: flex;
            gap: 0.75rem;
        }

        .btn {
            flex: 1;
            padding: 0.75rem;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.2);
        }

        .btn-primary:hover {
            background: #2563eb;
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: #1e293b;
            color: white;
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: #334155;
        }

        .dashboard-link {
            width: 100%;
            margin-top: 0.75rem;
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .dashboard-link:hover {
            background: rgba(16, 185, 129, 0.2);
        }

        .footer {
            margin-top: 1.5rem;
            font-size: 0.7rem;
            color: var(--text-muted);
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .version-pill {
            display: inline-block;
            background: #1e293b;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.6rem;
            color: var(--primary);
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="brand">
                <div class="logo-box">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                </div>
                <h1>PhishGuard AI</h1>
            </div>
            <div id="status-badge" class="status-badge">
                <div class="status-dot"></div>
                <span id="status-label" class="status-label">Secured</span>
            </div>
        </div>

        <div class="main-card">
            <div class="shield-icon-large">
                <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            </div>
            <div style="position: relative; z-index: 1;">
                <div style="font-size: 0.75rem; color: var(--text-muted); margin-bottom: 4px;">Active Protection</div>
                <div id="protection-status" style="font-size: 1rem; font-weight: 700; color: var(--text);">Shielding Active</div>
                <div id="last-scan-url" style="font-size: 0.7rem; color: var(--text-muted); margin-top: 8px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">Monitoring browser traffic...</div>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-item">
                <span id="stat-scanned" class="stat-val">0</span>
                <span class="stat-lbl">Analyzed</span>
            </div>
            <div class="stat-item">
                <span id="stat-blocked" class="stat-val" style="color: var(--danger);">0</span>
                <span class="stat-lbl">Prevented</span>
            </div>
        </div>

        <div class="config-section">
            <div class="input-wrapper">
                <input id="api-url" type="text" placeholder="http://localhost:8000" spellcheck="false" />
            </div>
            
            <div class="btn-group">
                <button id="save-api-url" class="btn btn-primary">Update</button>
                <button id="test-api-url" class="btn btn-secondary">Test</button>
            </div>
            
            <button id="open-dashboard" class="btn dashboard-link">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
                Open Dashboard
            </button>
        </div>

        <div class="footer">
            <div><span class="version-pill">v1.8 PRO</span> Neural Threat Detection</div>
            <div id="api-url-display" style="opacity: 0.6; font-family: monospace;">localhost:8000</div>
        </div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
