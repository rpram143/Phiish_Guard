<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <style>
        :root {
            --primary: #3b82f6;
            --primary-glow: rgba(59, 130, 246, 0.6);
            --danger: #ef4444;
            --success: #10b981;
            --warning: #f59e0b;
            --bg: #020617;
            --card: rgba(15, 23, 42, 0.6);
            --card-border: rgba(59, 130, 246, 0.15);
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --font-main: 'Space Grotesk', 'Inter', system-ui, sans-serif;
        }

        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap');

        body {
            width: 360px;
            font-family: var(--font-main);
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            padding: 1.25rem;
            background:
                radial-gradient(circle at 100% 0%, rgba(59, 130, 246, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 0% 100%, rgba(16, 185, 129, 0.05) 0%, transparent 30%);
            min-height: 480px;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo-box {
            width: 38px;
            height: 38px;
            background: linear-gradient(135deg, var(--primary), #1e40af);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px var(--primary-glow);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            font-size: 1.2rem;
            font-weight: 700;
            margin: 0;
            letter-spacing: -0.02em;
            background: linear-gradient(to bottom, #fff, #94a3b8);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-badge {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            padding: 5px 12px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(8px);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--success);
            border-radius: 50%;
            box-shadow: 0 0 12px var(--success);
        }

        .status-label {
            font-size: 0.65rem;
            font-weight: 700;
            color: var(--success);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .main-status-card {
            background: var(--card);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 1.5rem;
            margin-bottom: 1.25rem;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            backdrop-filter: blur(12px);
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
        }

        .main-status-card::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent, rgba(59, 130, 246, 0.03));
            pointer-events: none;
        }

        .shield-icon-wrapper {
            width: 64px;
            height: 64px;
            background: rgba(16, 185, 129, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1rem;
            border: 1px solid rgba(16, 185, 129, 0.1);
            color: var(--success);
            filter: drop-shadow(0 0 15px rgba(16, 185, 129, 0.2));
        }

        .protection-title {
            font-size: 1.125rem;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .protection-desc {
            font-size: 0.75rem;
            color: var(--text-muted);
            max-width: 80%;
            line-height: 1.4;
        }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.75rem;
            margin-bottom: 1.25rem;
        }

        .stat-card {
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.03);
            padding: 0.75rem 0.5rem;
            border-radius: 16px;
            text-align: center;
            backdrop-filter: blur(4px);
        }

        .stat-card .val {
            display: block;
            font-size: 1.1rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 2px;
        }

        .stat-card .lbl {
            font-size: 0.6rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .actions-group {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .primary-btn {
            background: linear-gradient(135deg, var(--primary), #2563eb);
            color: white;
            border: none;
            padding: 0.85rem;
            border-radius: 14px;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .primary-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.4);
            filter: brightness(1.1);
        }

        .secondary-group {
            display: flex;
            gap: 0.75rem;
        }

        .secondary-btn {
            flex: 1;
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: var(--text);
            padding: 0.7rem;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .secondary-btn:hover {
            background: rgba(30, 41, 59, 0.8);
            border-color: rgba(59, 130, 246, 0.3);
        }

        .config-bar {
            margin-top: auto;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.03);
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .url-input-container {
            display: flex;
            gap: 0.5rem;
        }

        input {
            flex: 1;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 0.5rem 0.75rem;
            color: var(--text);
            font-size: 0.75rem;
            font-family: monospace;
            outline: none;
        }

        input:focus {
            border-color: var(--primary);
        }

        .test-btn {
            background: transparent;
            border: 1px solid rgba(59, 130, 246, 0.3);
            color: var(--primary);
            padding: 0 1rem;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.65rem;
            cursor: pointer;
            text-transform: uppercase;
        }

        .footer-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.6rem;
            color: var(--text-muted);
            margin-top: 0.75rem;
        }

        .version-badge {
            background: rgba(59, 130, 246, 0.1);
            color: var(--primary);
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 800;
            text-transform: uppercase;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <div class="brand">
                <div class="logo-box">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
                    </svg>
                </div>
                <h1>PhishGuard <span style="color: var(--primary);">PRO</span></h1>
            </div>
            <div id="status-badge" class="status-badge">
                <div class="status-dot"></div>
                <span id="status-label" class="status-label">Active</span>
            </div>
        </div>

        <div id="main-status" class="main-status-card">
            <div class="shield-icon-wrapper">
                <svg id="status-icon" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
                </svg>
            </div>
            <div id="protection-status" class="protection-title">Secured Domain</div>
            <div id="last-scan-url" class="protection-desc">google.com is currently safe from threats</div>
        </div>

        <div class="stats-row">
            <div class="stat-card">
                <span id="stat-scanned" class="val">1.2k</span>
                <span class="lbl">Analyzed</span>
            </div>
            <div class="stat-card">
                <span id="stat-blocked" class="val" style="color: var(--danger);">42</span>
                <span class="lbl">Blocked</span>
            </div>
            <div class="stat-card">
                <span class="val" style="color: var(--success);">99.8%</span>
                <span class="lbl">Precision</span>
            </div>
        </div>

        <div class="actions-group">
            <button id="rescan-btn" class="primary-btn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 2v6h-6" />
                    <path d="M3 12a9 9 0 0 1 15-6.7L21 8" />
                    <path d="M3 22v-6h6" />
                    <path d="M21 12a9 9 0 0 1-15 6.7L3 16" />
                </svg>
                Scan This Page
            </button>
            <div class="secondary-group">
                <button id="open-dashboard" class="secondary-btn">Dashboard</button>
                <button id="save-api-url" class="secondary-btn">Save Settings</button>
            </div>
        </div>

        <div class="config-bar">
            <div class="url-input-container">
                <input id="api-url" type="text" placeholder="http://localhost:8000" spellcheck="false" />
                <button id="test-api-url" class="test-btn">Test</button>
            </div>
            <div class="footer-info">
                <div>AI ENGINE: <span style="font-weight: 700; color: #fff;">LLAMA 3.3V</span></div>
                <div class="version-badge">v1.8 PRO</div>
            </div>
        </div>
    </div>
    <script src="popup.js"></script>
</body>

</html>
